<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AOI Defect Map – 多筆比較</title>

  <script>window.API_BASE = "http://10.97.142.217:8101";</script>
  <script>window.IMG_HOST = "http://10.97.139.98:1454";</script>

  <!-- common css -->
  <link rel="stylesheet" href="static/css/base.css" />
  <link rel="stylesheet" href="static/css/tabs.css" />
  <!--<link rel="stylesheet" href="static/css/table.css" />-->

  <!-- AOI DENSITY css -->
  <link rel="stylesheet" href="static/css/aoi_density1.css">
  
</head>
<body>
<div id="app">
  <!-- Top -->
  <header id="top-container" class="card top">
    <div class="top-left">
      <nav id="system-tabs" class="sys-tabs">
        <button class="sys-tab active" data-view="defect-map">AOI 同片比對</button>
        <button class="sys-tab" data-view="aoi_density">AOI Density</button>
        <!--<button class="sys-tab" data-view="report">報表</button>-->
      </nav>
    </div>
    <div class="top-center">
      <div id="all-tab-container" class="line-tabs"></div>
    </div>
    <div class="top-right">
      <!-- 右上區域：兩個容器，透過 system_tabs.js 在不同 sys-tab 之間切換顯示 -->
      <div class="inline-filter" id="global-filter">
        <label>日期</label>
        <input id="fDateFrom" type="date" />
        <span>–</span>
        <input id="fDateTo" type="date" />
        <button id="applyDates" class="btn btn-sm">套用</button>
        <button id="clearDates" class="btn btn-sm btn-secondary">清空</button>
      </div>
      <!-- AOI Density 子分頁（預設隱藏；樣式共用 line-tabs） -->
      <div id="aoi_density-subtabs" class="line-tabs" style="display:none;"></div>
    </div>
  </header>

  <main id="main-area">
    <!-- ===================== AOI_DENSITY（8:2；左 2:8） ===================== -->
    <section id="aoi_density-root" class="card" style="display:none; grid-column:1 / -1;">
      <div class="aoi_density-grid-82">
        <!-- 左 8 -->
        <div id="aoi_density-left" class="aoi_density-left">
          <!-- Info -->
          <section id="aoi_density-info" class="card-sub">
            <div class="aoi_density-info-head">
              <h2 class="t">density公式: 'defect count' / 'total glass count(hourly)'</h2>
              <p class="sub"></p>
            </div>
            
            <div id="aoi_density-char-tabs" class="aoi_density-tabs"></div>
          </section>

          <!-- Charts -->
          <div id="aoi_density-charts" class="aoi_density-charts card-sub">
            <div id="aoi_density-facet"></div>
          </div>
        </div>

        <!-- 右 2：Filter -->
        <aside id="aoi_density-right" class="aoi_density-right card-sub">
          <div class="filter-panel-title">篩選</div>

          <!-- 日期（AOI Density 專屬區間，用於向後端取資料；保留） -->
          <div class="filter-item">
            <div class="filter-actions">
              <button id="aoi_densityApply" class="btn btn-xs">套用</button>
              <button id="aoi_densityClear" class="btn btn-xs btn-secondary">清空</button>
            </div>
            <div class="row inline">
              <input type="date" id="aoi_densityStart">
              <span class="sep">–</span>
              <input type="date" id="aoi_densityEnd">
            </div>
          </div>

          <div id="aoi_density-dynhosts"></div>
          <p>----------------</p>

        </aside>
      </div>

      <!-- Bottom row: Table + Map -->
      <div class="aoi_density-bottom-row">
        <!-- Table -->
        <section id="aoi_density-table-wrap" class="card-sub">
          <div class="table-head">Analysis Table</div>
          <div class="table-wrap">
            <table class="table aoi_density-table" id="aoi_density-table">
              <thead></thead>
              <tbody></tbody>
            </table>
          </div>
        </section>

        <!-- Map -->
        <section id="aoi_density-map-wrap" class="card-sub">
          <div class="table-head">Map</div>
          <div class="map-viewport">
            <canvas id="aoi_density-mini-map"></canvas>
          </div>
        </section>
      </div>
    </section>
    <!-- ===================== /AOI_DENSITY ===================== -->
  </main>
</div>

<div class="toast"></div>

<!-- JS -->
<script src="static/js/lib/echarts.min.js"></script>
<script src="static/js/system_tab.js"></script>

<!-- AOI Density -->
<script src="static/js/aoi_density/api1.js" defer></script>
<script src="static/js/aoi_density/service7.js" defer></script>
<script src="static/js/aoi_density/router4.js" defer></script>
<script src="static/js/aoi_density/multidd2.js" defer></script>
<script src="static/js/aoi_density/filter2.js" defer></script>
<script src="static/js/aoi_density/chart7.js" defer></script>
<script src="static/js/aoi_density/table4.js" defer></script>
<script src="static/js/aoi_density/defect_map.js" defer></script>
</body>
</html>
