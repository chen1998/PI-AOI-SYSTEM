<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AOI Defect Map – 多筆比較</title>

  <!-- 依你的環境修改 -->
  <script>window.API_BASE = "http://10.97.142.217:8100";</script>
  <script>window.IMG_HOST = "http://10.97.139.98:1454";</script>
  
  <link rel="stylesheet" href="static/css/multi_filter.css" />
  <link rel="stylesheet" href="static/css/main2.css" />
  <link rel="stylesheet" href="static/css/top.css" />
  <link rel="stylesheet" href="static/css/table.css" />
  <link rel="stylesheet" href="static/css/map.css" />
  <link rel="stylesheet" href="static/css/image.css" />
  
</head>
<body>
<div id="app">
  <!-- Top：緊湊化 -->
  <header id="top-container" class="card top">
    <div class="top-left">
      <nav id="system-tabs" class="sys-tabs">
        <button class="sys-tab active" data-view="defect-map">AOI 同片比對</button>
        <button class="sys-tab" data-view="aidi">AIDI</button>
        <button class="sys-tab" data-view="report">報表</button>
      </nav>
    </div>
    <div class="top-center">
      <h1>AOI 同片比對</h1>
      <div id="all-tab-container" class="line-tabs"></div>
    </div>
    <div class="top-right">
      <div class="inline-filter" id="global-filter">
        <label>日期</label>
        <input id="fDateFrom" type="date" />
        <span>–</span>
        <input id="fDateTo" type="date" />
        <button id="applyDates" class="btn btn-sm">套用</button>
        <button id="clearDates" class="btn btn-sm btn-secondary">清空</button>
      </div>
    </div>
  </header>

  <main id="main-area">
    <!-- 左：地圖 -->
    <section id="defect-map-section" class="card">
      <!-- 標題列：位置維持不變，字形微調 -->
      <div class="section-title">
        <div class="map-title">Defect Map</div>
        <div class="map-controls">
          <div class="filter-group">
            <span>Size：</span>
            <label><input type="checkbox" id="size-S" checked> S</label>
            <label><input type="checkbox" id="size-M" checked> M</label>
            <label><input type="checkbox" id="size-L" checked> L</label>
            <label><input type="checkbox" id="size-O" checked> O</label>
          </div>
          <div class="filter-group" id="type-filters">
            <span>Type：</span>
            <!-- 由 JS 動態填入 -->
          </div>
          <div class="filter-group">
            <label>Offset(µm)
              <input id="offsetInput" type="number" min="1" max="100" value="5" class="input-xs">
            </label>
            <button id="applyOffset" class="btn btn-xs">套用</button>
          </div>
          
        </div>
      </div>
    
      <!-- 左右 40:60 版面 -->
      <div class="map-flex">
        <!-- 左側：Canvas（40%） -->
        <div class="map-left">
          <div id="defect-map-container">
            <canvas id="defect-map-canvas"></canvas>
            <div id="map-axes">
              <div class="axis x">X</div>
              <div class="axis y">Y</div>
            </div>
            <div class="map-controls map-ops">
              <div class="btn-group">
                <button id="btnMapReset" class="btn btn-xs">歸位</button>
                <button id="btnZoomIn" class="btn btn-xs">＋</button>
                <button id="btnZoomOut" class="btn btn-xs">－</button>
                <button id="btnBoxZoom" class="btn btn-xs">框選</button>
                <button id="btnClearBox" class="btn btn-xs btn-secondary">清除框</button>
                <!-- <label class="right">
                  <input id="match-same-dot" type="checkbox" checked />
                  同點篩選(依照offset範圍內重疊)
                </label>-->
              </div>
            </div>
          </div>
        </div>
    
        <!-- Legend + Info -->
        <div class="map-right">
          <div class="map-legend" id="map-legend"></div>
          <div id="map-info-container" class="map-info card-sub"></div>
        </div>
      </div>
    </section>
    

    <!-- Run Info  -->
    <aside id="run-info-block" class="card">
      <div class="section-title compact">
        <span>Run Info</span>
        <div id="run-stats" class="stats-badges">
          <span class="badge">筆數 <b>0</b></span>
          <span class="badge">已選 <b id="sel-count">0</b></span>
        </div>
      </div>

      <div id="run-info-filter" class="micro-filter">
        <div class="filter-row">
          <label class="lbl">Glass</label>
          <!-- 只篩選 glass_id -->
          <input id="fQuery" type="text" placeholder="輸入 glass_id 以快速篩選">
          <button id="applyQuery" class="btn btn-xs">搜尋</button>
          <button id="clearQuery" class="btn btn-xs btn-secondary">清空</button>

          <div id="multi_select_recipe"></div>

        </div>
      
        <label class="right">
          <input id="match-same-glass" type="checkbox" checked />
          相同 glass 自動篩選
        </label>
      </div>

      <div id="run-info-table-container" class="table-wrap">
        <table class="table">
          <thead></thead>
          <tbody id="run-info-tbody"></tbody>
        </table>
      </div>

      <div class="actions">
        <button id="btnClearSel" class="btn btn-xs btn-secondary" title="清除選取">清除選取</button>
      </div>
    </aside>
  </main>

  <!-- 多筆 Defect Tables（兩欄並排、內層 overflow-y） -->
  <section id="defect-lists" class="card">
    <div class="section-title compact">
      <span>Defect Tables（每筆）</span>
      <div class="right">
        <span class="badge">選取 <b id="dl-count">0</b> 筆</span>
      </div>
    </div>
    <div id="defect-lists-container" class="defect-lists-grid"></div>
  </section>

</div>

<div class="toast"></div>

<!-- JS -->
<script src="static/js/colors2.js"></script>
<script src="static/js/bus1.js"></script>
<script src="static/js/api1.js"></script>
<script src="static/js/run_info_table4.js"></script>
<script src="static/js/defect_map.js"></script>
<script src="static/js/defect_list2.js"></script>
</body>
</html>
